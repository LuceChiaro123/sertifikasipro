version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: sertifikasipro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sertifikasipro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sertifikasipro-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/sertifikasipro
      SECRET_KEY: change-me-in-production-min-32-chars-long
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      UPLOAD_DIR: /app/uploads
      MAX_FILE_SIZE_MB: "10"
      ALLOWED_EXTENSIONS: "pdf,jpg,jpeg,png"
      CORS_ORIGINS: "http://localhost:5173"
      APP_ENV: development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads

volumes:
  pgdata:
